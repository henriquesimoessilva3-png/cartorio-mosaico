services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cartorio-mosaico-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cartorio_mosaico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cartorio_mosaico"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
