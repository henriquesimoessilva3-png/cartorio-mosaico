name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Por enquanto publica o protótipo HTML standalone (zero infra).
# Quando migrar pro deploy do React V0.5 (Pages + Render + Supabase),
# trocar `path: prototype` pelo job de build do frontend — receita em
# docs/DEPLOY-FREE.md.
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype
      - id: deployment
        uses: actions/deploy-pages@v4
